<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Downloads</title>
    <link rel="stylesheet" href="login.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/2190736b83.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <section class="login-container">
      <img src="images/Login pic.jpg" alt="" />
      <div class="login-content">
        <div class="logo">
          <h1>Podia</h1>
        </div>
        <div class="info">
          <h2>Login to Podia</h2>
          <p>If you forget your password you can <a href="">reset it</a>.</p>

          <form action="">
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" placeholder="e.g. picard@starfleet.org" />
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" placeholder="........" />
            </div>
            <button class="submit-btn">Login</button>
          </form>

          <p class="sign-up"><a href="">Sign up</a> if you need an account.</p>
        </div>
      </div>
    </section>
  </body>
</html>
